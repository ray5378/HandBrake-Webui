services:
  handbrake-webui:
    image: ray5378/handbrake-webui:latest
    container_name: handbrake-webui
    ports:
      - 52389:52389
    volumes:
      - ./config:/config
      - ./drive:/drive
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PORT=52389
      - MAX_CONCURRENT_JOBS=2
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
